<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Lernen - Hệ Thống Tài Khoản</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==========================================
        // CẤU HÌNH FIREBASE CỦA BẠN
        // ==========================================
        // DÁN ĐOẠN MÃ FIREBASE CONFIG CỦA BẠN VÀO ĐÂY THAY CHO ĐOẠN MẪU NÀY:
        const firebaseConfig = {
            apiKey: "AIzaSyA_0t95PFaeITktsCGnBQTF7pBD9Y9HhZc",
            authDomain: "tu-vung-tieng-duc.firebaseapp.com",
            projectId: "tu-vung-tieng-duc",
            storageBucket: "tu-vung-tieng-duc.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456:web:abcdef"
        };

        // Khởi tạo các dịch vụ Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // KIỂM TRA TRẠNG THÁI ĐĂNG NHẬP
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';
                document.getElementById('user-email').innerText = `Tài khoản: ${user.email}`;
                displayWords(); // Tải từ vựng của cơ sở dữ liệu
            } else {
                currentUser = null;
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('app-section').style.display = 'none';
            }
        });

        // HÀM ĐĂNG KÝ TÀI KHOẢN
        window.handleSignUp = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                alert("Đăng ký tài khoản thành công!");
            } catch (error) {
                alert("Lỗi đăng ký: " + error.message);
            }
        };

        // HÀM ĐĂNG NHẬP TÀI KHOẢN
        window.handleSignIn = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert("Lỗi đăng nhập: " + error.message);
            }
        };

        // HÀM ĐĂNG XUẤT
        window.handleSignOut = async () => {
            await signOut(auth);
        };

        // HÀM THÊM TỪ VỰNG LÊN ĐÁM MÂY (FIRESTORE)
        window.addWord = async () => {
            const germanInput = document.getElementById('german-word');
            const typeInput = document.getElementById('word-type');
            const vietnameseInput = document.getElementById('vietnamese-meaning');

            if (germanInput.value.trim() === '' || vietnameseInput.value.trim() === '') {
                alert('Vui lòng điền đầy đủ thông tin!');
                return;
            }

            try {
                // Lưu từ vựng kèm theo UID (ID riêng biệt của mỗi tài khoản)
                await addDoc(collection(db, "words"), {
                    german: germanInput.value,
                    type: typeInput.value,
                    vietnamese: vietnameseInput.value,
                    userId: currentUser.uid // Tách biệt dữ liệu ở đây
                });

                germanInput.value = '';
                vietnameseInput.value = '';
                displayWords();
            } catch (error) {
                alert("Lỗi không thể lưu dữ liệu: " + error.message);
            }
        };

        // HÀM HIỂN THỊ TỪ VỰNG THEO TỪNG TÀI KHOẢN
        async function displayWords() {
            const container = document.getElementById('word-list-container');
            container.innerHTML = '<p style="text-align:center;">Đang tải dữ liệu từ đám mây...</p>';

            try {
                // Chỉ lấy những từ nào có dữ liệu userId trùng với tài khoản đang đăng nhập
                const q = query(collection(db, "words"), where("userId", "==", currentUser.uid));
                const querySnapshot = await getDocs(q);
                
                container.innerHTML = '';
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<p style="text-align:center; color:#7f8c8d;">Sổ tay trống. Hãy thêm từ vựng đầu tiên!</p>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const item = docSnap.data();
                    const docId = docSnap.id;

                    const wordBox = document.createElement('div');
                    wordBox.className = 'word-item';
                    wordBox.innerHTML = `
                        <div class="word-info">
                            <strong>${item.german}</strong> <span>(${item.type})</span>
                            <div class="word-meaning">${item.vietnamese}</div>
                        </div>
                        <button class="btn-delete" onclick="deleteWord('${docId}')">Xóa</button>
                    `;
                    container.appendChild(wordBox);
                });
            } catch (error) {
                container.innerHTML = '<p style="color:red;">Lỗi tải danh sách từ vựng.</p>';
            }
        }

        // HÀM XÓA TỪ VỰNG TRÊN ĐÁM MÂY
        window.deleteWord = async (docId) => {
            if (confirm("Bạn có chắc chắn muốn xóa từ này không?")) {
                await deleteDoc(doc(db, "words", docId));
                displayWords();
            }
        };
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-block { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-primary { background-color: #3498db; color: white; }
        .btn-success { background-color: #2ecc71; color: white; }
        .btn-danger { background-color: #e74c3c; color: white; padding: 8px 15px; width: auto; margin-top: 5px;}
        .word-list { width: 100%; max-width: 450px; }
        .word-item { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #2ecc71; }
        .word-info strong { font-size: 18px; color: #2c3e50; }
        .word-info span { font-style: italic; color: #7f8c8d; font-size: 14px; }
        .word-meaning { margin-top: 5px; color: #555; }
        .btn-delete { background-color: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .header-app { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 450px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="auth-section" class="container">
        <h2 style="text-align: center; color: #2c3e50;">Đăng Nhập Sổ Tay</h2>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" placeholder="Nhập email của bạn...">
        </div>
        <div class="form-group">
            <label>Mật khẩu:</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu...">
        </div>
        <button class="btn-block btn-primary" onclick="handleSignIn()">Đăng Nhập</button>
        <button class="btn-block btn-success" onclick="handleSignUp()">Đăng Ký Tài Khoản Mới</button>
    </div>

    <div id="app-section" style="display: none; width: 100%; max-width: 450px;">
        <div class="header-app">
            <span id="user-email" style="font-weight: bold; color: #7f8c8d;"></span>
            <button class="btn-danger" onclick="handleSignOut()">Đăng xuất</button>
        </div>

        <div class="container">
            <h3 style="margin-top: 0; color: #2c3e50; text-align: center;">Thêm Từ Mới</h3>
            <div class="form-group">
                <label>Từ tiếng Đức:</label>
                <input type="text" id="german-word" placeholder="Ví dụ: với danh từ nhớ điền cả die/der/das...">
            </div>
            <div class="form-group">
                <label>Loại từ:</label>
                <select id="word-type">
                    <option value="Danh từ">Danh từ (Noun)</option>
                    <option value="Động từ">Động từ (Verb)</option>
                    <option value="Tính từ">Tính từ (Adjective)</option>
                    <option value="Cụm từ">Cụm từ / Khác</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nghĩa tiếng Việt:</label>
                <input type="text" id="vietnamese-meaning" placeholder="Nghĩa của từ...">
            </div>
            <button class="btn-block btn-success" onclick="addWord()">Lưu Lên Đám Mây</button>
        </div>

        <div class="word-list" id="word-list-container"></div>
    </div>

</body>
</html>
