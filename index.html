<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Tiếng Đức Của Tôi</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
            color: #16213e;
        }
        #checking {
            text-align: center;
            color: #888;
            margin-top: 100px;
        }
        #appContent {
            display: none;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }
        .user-email {
            font-size: 14px;
            color: #555;
        }
        .logout-btn {
            background: #0f3460;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .logout-btn:hover {
            background: #16213e;
        }
    </style>
</head>
<body>

    <!-- Hiển thị trong khi đang kiểm tra trạng thái đăng nhập -->
    <div id="checking">Đang kiểm tra đăng nhập...</div>

    <!-- Nội dung trang chỉ hiện ra sau khi xác nhận đã đăng nhập -->
    <div id="appContent">
        <div class="topbar">
            <span class="user-email" id="userEmail"></span>
            <button class="logout-btn" id="logoutBtn">Đăng xuất</button>
        </div>

        <h1>Mọi thứ đã sẵn sàng 100%!</h1>
        <p>Chào mừng bạn đến với trang web lưu từ vựng tiếng Đức đầu tay.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getAuth,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_0t95PFaeITktsCGnBQTF7pBD9Y9HhZc",
            authDomain: "deutschlernenvn-ce368.firebaseapp.com",
            projectId: "deutschlernenvn-ce368",
            storageBucket: "deutschlernenvn-ce368.firebasestorage.app",
            messagingSenderId: "1093157479291",
            appId: "1:1093157479291:web:fa199ba7019011e5d813de",
            measurementId: "G-HC32YTZ3YM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const LOGIN_PAGE = "login.html";

        const checkingEl = document.getElementById("checking");
        const appContentEl = document.getElementById("appContent");
        const userEmailEl = document.getElementById("userEmail");
        const logoutBtn = document.getElementById("logoutBtn");

        // ====== AUTH GUARD ======
        // Nếu chưa đăng nhập -> đẩy về trang login
        // Nếu đã đăng nhập -> hiện nội dung trang + lưu uid để dùng cho Firestore sau này
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = LOGIN_PAGE;
                return;
            }

            // Đã đăng nhập thành công
            window.currentUserUid = user.uid; // dùng biến này khi đọc/ghi Firestore
            userEmailEl.textContent = user.email;

            checkingEl.style.display = "none";
            appContentEl.style.display = "block";
        });

        // ====== ĐĂNG XUẤT ======
        logoutBtn.addEventListener("click", async () => {
            await signOut(auth);
            window.location.href = LOGIN_PAGE;
        });
    </script>

</body>
</html>
