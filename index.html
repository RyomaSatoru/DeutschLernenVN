<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Lernen - Lưu Trữ Từ Vựng</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #34495e;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #27ae60;
        }
        .word-list {
            width: 100%;
            max-width: 600px;
        }
        .word-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #3498db;
        }
        .word-info strong {
            font-size: 18px;
            color: #2980b9;
        }
        .word-info span {
            font-style: italic;
            color: #7f8c8d;
            font-size: 14px;
        }
        .word-meaning {
            margin-top: 5px;
            color: #2c3e50;
        }
        .btn-delete {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            width: auto;
        }
        .btn-delete:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <h1>Sổ Tay Từ Vựng Tiếng Đức</h1>

    <div class="container">
        <div class="form-group">
            <label for="german-word">Từ tiếng Đức:</label>
            <input type="text" id="german-word" placeholder="Ví dụ: das Auto, lernen...">
        </div>
        <div class="form-group">
            <label for="word-type">Loại từ:</label>
            <select id="word-type">
                <option value="Noun">Danh từ (Noun)</option>
                <option value="Verb">Động từ (Verb)</option>
                <option value="Adjective">Tính từ (Adjective)</option>
                <option value="Other">Khác</option>
            </select>
        </div>
        <div class="form-group">
            <label for="vietnamese-meaning">Nghĩa tiếng Việt:</label>
            <input type="text" id="vietnamese-meaning" placeholder="Ví dụ: ô tô, học tập...">
        </div>
        <button onclick="addWord()">Lưu Vào Sổ Tay</button>
    </div>

    <div class="word-list" id="word-list-container"></div>

    <script>
        // 1. Hàm hiển thị danh sách từ vựng từ LocalStorage ra màn hình
        function displayWords() {
            const container = document.getElementById('word-list-container');
            container.innerHTML = ''; // Xóa danh sách cũ đi để tải lại

            // Lấy dữ liệu từ bộ nhớ trình duyệt, nếu chưa có thì tạo mảng rỗng []
            const words = JSON.parse(localStorage.getItem('myGermanWords')) || [];

            // Duyệt qua từng từ và tạo giao diện hiển thị
            words.forEach((item, index) => {
                const wordBox = document.createElement('div');
                wordBox.className = 'word-item';
                wordBox.innerHTML = `
                    <div class="word-info">
                        <strong>${item.german}</strong> <span>(${item.type})</span>
                        <div class="word-meaning">${item.vietnamese}</div>
                    </div>
                    <button class="btn-delete" onclick="deleteWord(${index})">Xóa</button>
                `;
                container.appendChild(wordBox);
            });
        }

        // 2. Hàm thêm từ vựng mới
        function addWord() {
            const germanInput = document.getElementById('german-word');
            const typeInput = document.getElementById('word-type');
            const vietnameseInput = document.getElementById('vietnamese-meaning');

            // Kiểm tra xem người dùng có bỏ trống ô nào không
            if (germanInput.value.trim() === '' || vietnameseInput.value.trim() === '') {
                alert('Vui lòng nhập đầy đủ từ tiếng Đức và nghĩa tiếng Việt!');
                return;
            }

            // Tạo một đối tượng từ vựng mới
            const newWord = {
                german: germanInput.value,
                type: typeInput.value,
                vietnamese: vietnameseInput.value
            };

            // Lấy danh sách từ cũ, thêm từ mới vào, rồi lưu ngược lại vào LocalStorage
            const words = JSON.parse(localStorage.getItem('myGermanWords')) || [];
            words.push(newWord);
            localStorage.setItem('myGermanWords', JSON.stringify(words));

            // Reset lại các ô nhập chữ về rỗng
            germanInput.value = '';
            vietnameseInput.value = '';

            // Cập nhật lại danh sách hiển thị trên màn hình
            displayWords();
        }

        // 3. Hàm xóa từ vựng
        function deleteWord(index) {
            const words = JSON.parse(localStorage.getItem('myGermanWords')) || [];
            words.splice(index, 1); // Xóa từ tại vị trí index
            localStorage.setItem('myGermanWords', JSON.stringify(words));
            displayWords(); // Cập nhật lại màn hình
        }

        // Gọi hàm này đầu tiên khi trang web vừa được mở lên để hiện các từ đã lưu từ trước
        displayWords();
    </script>
</body>
</html>
